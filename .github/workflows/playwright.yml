name: Playwright E2E Tests

on:
  push:
    branches: [main, playwright]   # 브랜치에 push 할 때
  pull_request:
    branches: [main]               # main 으로 PR 올릴 때

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js 설정
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 패키지 설치
      - name: Install dependencies
        run: npm ci

      # 4. Playwright 브라우저 설치 (Selenium과 달리 드라이버 별도 설치 불필요)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # 5. PR → smoke 테스트만 (빠른 피드백)
      #    push → 전체 테스트
      - name: Run smoke tests (PR)
        if: github.event_name == 'pull_request'
        run: npm run test:smoke
        env:
          ENVIRONMENT: staging

      - name: Run full tests (push)
        if: github.event_name == 'push'
        run: npm test
        env:
          ENVIRONMENT: staging

      # 6. HTML 리포트 업로드 (항상 실행 — 실패해도 결과 확인 가능)
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 7. 실패 시 스크린샷 + 영상 업로드
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
