stages:
  - test

# ── 공통 베이스 설정 ─────────────────────────────────────────────
.playwright-base:
  # Playwright 공식 Docker 이미지 — 브라우저 별도 설치 불필요
  image: mcr.microsoft.com/playwright:v1.60.0-jammy
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  before_script:
    - npm ci

# ── MR(PR) 시: smoke 테스트만 (빠른 피드백) ─────────────────────
smoke-test:
  extends: .playwright-base
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - npx playwright test --grep @smoke
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 30 days

# ── push 시: 전체 테스트 ─────────────────────────────────────────
full-test:
  extends: .playwright-base
  stage: test
  rules:
    - if: $CI_COMMIT_BRANCH == "playwright"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - npx playwright test
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 30 days
