[pytest]
pythonpath = .
testpaths = tests performance

# pytest 기본 옵션
# -v: 상세출력 / -s: 로그출력 / --tb=short: 간략traceback
# --alluredir: allure결과경로 / --clean-alluredir: 결과초기화
# -m "not slow": slow 테스트 기본 제외

addopts = -v -s --tb=short --alluredir=allure-results --clean-alluredir -m "not slow"
markers =
    slow: 실행 시간이 긴 테스트 (AI 생성, 다운로드 등)
    xfail: 알려진 버그로 인해 실패가 예상되는 테스트
